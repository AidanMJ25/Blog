<form class="contact-form" action="https://formspree.io/f/mrbybwzk" method="POST">
  <label for="name">Your Name</label>
  <input id="name" name="name" type="text" autocomplete="name" required>

  <label for="email">Your Email</label>
  <input id="email" name="email" type="email" autocomplete="email" required>

  <label for="message">Your Message</label>
  <textarea id="message" name="message" required></textarea>

  <input type="hidden" name="_subject" value="New message from your blog contact form">
  <input type="text" name="_gotcha" class="contact-form__honeypot" tabindex="-1" autocomplete="off">
  <button type="submit" class="button button--primary">Send</button>
</form>
